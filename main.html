<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Here</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Main feed page -->
  <div class="main-page-container" id="mainPageContainer">

    <!-- Scrollable viewport (background + scrolling) -->
    <div id="canvasViewport">
        <svg id="linkLayer" width="100%" height="100%"></svg>
        <div id="postCanvas"></div>
    </div>

    <button id="logoutBtn" class="view-toggle logout-btn">log out</button>
  </div>

        <!-- Post form overlay (hidden by default, opens on right-click) -->
        <div class="post-form-overlay" id="postFormOverlay" style="display: none;">
        <div class="post-form" id="postForm">

            <input type="text" class="post-form-title" id="postTitle" placeholder="title" maxlength="75" autocomplete="off">

            <div class="post-form-category-row">
            <select class="post-form-category" id="postCategory">
                <option value="">none</option>
            </select>
            <input type="text" class="post-form-category-input" id="postCategoryInput" placeholder="type category, press enter" autocomplete="off" style="display: none;">
            <div class="post-form-add-category" id="addCategoryToggle">+</div>
            </div>

            <label class="post-form-file-label" id="postFileLabel">
            <span id="postFileName">choose file</span>
            <input type="file" id="postFileInput" multiple>
            </label>

            <label class="post-form-file-label" id="postCoverImageLabel" style="display:none;">
            <span id="postCoverFileName">choose cover image</span>
            <input type="file" id="postCoverImageInput" accept="image/*">
            </label>

            <textarea class="post-form-text" id="postText" placeholder="text"></textarea>

            <div class="post-form-buttons">
            <button id="postDeleteBtn" style="display:none; margin-right:auto; color:rgba(255,100,100,0.6);">delete</button>
            <button id="postSubmitBtn">submit</button>
            <button id="postCancelBtn">cancel</button>
            </div>

        </div>
        </div>


        <!-- ============================================ -->
        <!-- POST DETAIL MODAL                            -->
        <!-- ============================================ -->
        <div id="postDetailOverlay" class="overlay" style="display:none;">
        <div id="postDetailModal" class="post-detail-modal">
            <div class="post-detail-header">
            <span id="postDetailClose" class="post-detail-close">×</span>
            </div>

            <div id="postDetailContent" class="post-detail-content"></div>

            <div class="post-detail-comments">
            <div class="post-detail-comments-title">comments</div>

            <div id="commentsList" class="comments-list"></div>

            <div class="comment-form">
                <input id="commentInput" class="comment-input" type="text" placeholder="write a comment..." />
                <button id="commentSubmitBtn" class="comment-submit-btn">post</button>
            </div>
            </div>
        </div>
        </div>

        <!-- Notification Panel -->
        <div id="notifBar" class="notif-bar"></div>
        <div id="notifPanel" class="notif-panel">
        <div class="notif-panel-inner">
            <div class="notif-list" id="notifList"></div>
        </div>
        </div>

        <!-- Profile Modal -->
        <div id="profileOverlay" style="display:none; position:fixed; inset:0; z-index:150; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
        <div id="profileModal" class="profile-modal">
            <span id="profileClose" class="profile-close">×</span>

            <div class="profile-cover-wrap" id="profileCoverWrap">
            <img id="profileCoverImg" class="profile-cover-img" src="" alt="" style="display:none;">
            <div class="profile-cover-placeholder" id="profileCoverPlaceholder"></div>
            <div class="profile-upload-overlay" id="profileCoverOverlay" style="display:none;">
                <label for="profileCoverInput">+</label>
            </div>
            </div>

            <div class="profile-identity-row">
            <div class="profile-pfp-wrap">
                <div id="profilePfpWidget"></div>
                <div class="profile-upload-overlay" id="profilePfpOverlay" style="display:none;">
                <label for="profilePfpInput">+</label>
                </div>
            </div>
            <span id="profileUsername" class="profile-username"></span>
            <input id="profileUsernameInput" class="profile-username-input" maxlength="12" style="display:none;" autocomplete="off">
            </div>

            <button id="profileSaveBtn" class="profile-save-btn" style="display:none;">save</button>
            <div id="profilePostsList" class="profile-posts-list"></div>
        </div>
        </div>

        <!-- Hidden file inputs for profile editing -->
        <input type="file" id="profileCoverInput" accept="image/*" style="display:none;">
        <input type="file" id="profilePfpInput" accept="image/webp,image/gif,image/*" style="display:none;">

    <script type="module" src="/src/main.js"></script>
</body>
</html>
