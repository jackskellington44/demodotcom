<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Here</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Main feed page -->
    <div class="main-page-container" id="mainPageContainer">

        <!-- Post feed -->
        <div class="post-feed" id="postFeed">
            <!-- Posts will be loaded here dynamically -->
        </div>

        <!-- Post form overlay (hidden by default, opens on right-click) -->
                <!-- Post form overlay (hidden by default, opens on right-click) -->
        <div class="post-form-overlay" id="postFormOverlay" style="display: none;">
            <div class="post-form" id="postForm">

                <!-- Title input -->
                <input type="text" class="post-form-title" id="postTitle" placeholder="title" maxlength="75" autocomplete="off">

                <!-- Category dropdown + add new -->
                <div class="post-form-category-row">
                    <select class="post-form-category" id="postCategory">
                        <option value="">none</option>
                    </select>
                    <input type="text" class="post-form-category-input" id="postCategoryInput" placeholder="type category, press enter" autocomplete="off" style="display: none;">
                    <div class="post-form-add-category" id="addCategoryToggle">+</div>
                </div>

                <!-- File upload -->
                <label class="post-form-file-label" id="postFileLabel">
                    <span id="postFileName">choose file</span>
                    <input type="file" id="postFileInput">
                </label>

                <!-- Text input -->
                <textarea class="post-form-text" id="postText" placeholder="text"></textarea>

                <!-- Buttons -->
                <div class="post-form-buttons">
                    <button id="postSubmitBtn">submit</button>
                    <button id="postCancelBtn">cancel</button>
                </div>

            </div>
        </div>

        <!-- Cover image prompt overlay -->
        <div class="cover-image-overlay" id="coverImageOverlay" style="display: none;">
            <div class="cover-image-prompt">
                <div class="cover-image-prompt-text">add a cover image?</div>
                <label class="cover-image-file-label" id="coverImageLabel">
                    <span id="coverImageFileName">choose image</span>
                    <input type="file" id="coverImageInput" accept="image/*">
                </label>
                <div class="cover-image-buttons">
                    <button id="coverImageSubmitBtn">upload</button>
                    <button id="coverImageSkipBtn">skip</button>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
